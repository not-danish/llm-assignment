<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canada Travel Advisory — Multi-Agent System</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍁</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
::selection { background: rgba(178,34,52,0.4); }

body {
  font-family: 'Outfit', sans-serif;
  color: #fff;
  background: radial-gradient(ellipse at 50% 15%, #1a1012 0%, #0d0a0b 45%, #060405 100%);
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ═══ ANIMATIONS ═══ */
@keyframes auroraMove { 0%{transform:translate(0,0) rotate(0) scale(1)} 50%{transform:translate(-4%,3%) rotate(2deg) scale(1.03)} 100%{transform:translate(3%,-2%) rotate(-1deg) scale(.98)} }
@keyframes leafPulse { 0%,100%{transform:scale(1) rotate(0)} 50%{transform:scale(1.1) rotate(4deg);opacity:.85} }
@keyframes dotBounce { 0%,80%,100%{transform:scale(.6);opacity:.25} 40%{transform:scale(1.3);opacity:1} }
@keyframes badgePop { from{transform:translateX(-10px) scale(.85);opacity:0} to{transform:none;opacity:1} }
@keyframes msgLeft { from{transform:translateX(-30px) translateY(12px);opacity:0;filter:blur(4px)} to{transform:none;opacity:1;filter:blur(0)} }
@keyframes msgRight { from{transform:translateX(30px) translateY(12px);opacity:0;filter:blur(4px)} to{transform:none;opacity:1;filter:blur(0)} }
@keyframes pillUp { from{transform:translateY(20px) scale(.95);opacity:0} to{transform:none;opacity:1} }
@keyframes splashOut { 0%{opacity:1} 75%{opacity:1} 100%{opacity:0;pointer-events:none} }
@keyframes splashLeaf { 0%{transform:scale(.4) rotate(-40deg);opacity:0} 55%{transform:scale(1.2) rotate(6deg);opacity:1} 100%{transform:scale(1) rotate(0);opacity:1} }
@keyframes splashText { from{transform:translateY(24px);opacity:0;filter:blur(3px)} to{transform:none;opacity:1;filter:blur(0)} }
@keyframes heroIn { from{opacity:0;transform:translateY(50px);filter:blur(6px)} to{opacity:1;transform:none;filter:blur(0)} }
@keyframes headerDrop { from{transform:translateY(-100%);opacity:0} to{transform:none;opacity:1} }
@keyframes barRise { from{transform:translateY(50px);opacity:0} to{transform:none;opacity:1} }
@keyframes glowBreath { 0%,100%{box-shadow:0 0 24px rgba(178,34,52,0)} 50%{box-shadow:0 0 36px rgba(178,34,52,0.2)} }
@keyframes orbit { from{transform:rotate(0)} to{transform:rotate(360deg)} }
@keyframes float { 0%,100%{transform:translateY(0) translateX(0);opacity:.12} 33%{transform:translateY(-22px) translateX(8px);opacity:.28} 66%{transform:translateY(-10px) translateX(-6px);opacity:.15} }
@keyframes shimmer { 0%{background-position:-200% center} 100%{background-position:200% center} }
@keyframes ringExpand { from{transform:scale(.7);opacity:0} to{transform:scale(1);opacity:1} }
@keyframes statusPulse { 0%,100%{opacity:.5;transform:scale(1)} 50%{opacity:1;transform:scale(1.3)} }

/* ═══ SPLASH ═══ */
#splash {
  position: fixed; inset: 0; z-index: 9999;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at 50% 35%, #1a1012 0%, #0d0a0b 60%, #060405 100%);
  animation: splashOut 2.4s ease-in forwards;
}
.splash-ring {
  position: absolute; border-radius: 50%;
  border: 1px solid rgba(178,34,52,0.15); opacity: 0;
}
.splash-ring-1 { width:200px; height:200px; animation: ringExpand 1.2s cubic-bezier(.16,1,.3,1) .3s both; }
.splash-ring-2 { width:300px; height:300px; border-color: rgba(178,34,52,0.08); animation: ringExpand 1.4s cubic-bezier(.16,1,.3,1) .5s both; }
.splash-logo { animation: splashLeaf 1.1s cubic-bezier(.34,1.56,.64,1) .15s both; }
.splash-logo-inner {
  width: 88px; height: 88px; border-radius: 24px;
  background: linear-gradient(135deg, #B22234, #D44840, #E06858);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 80px rgba(178,34,52,0.45), 0 0 160px rgba(178,34,52,0.15);
}
.splash-title { margin-top:30px; font-family:'Playfair Display',serif; font-size:24px; color:rgba(255,255,255,0.92); font-weight:400; letter-spacing:1.5px; animation:splashText .8s ease .6s both; }
.splash-sub { margin-top:10px; font-size:11px; color:rgba(255,255,255,0.3); letter-spacing:3px; text-transform:uppercase; font-weight:500; animation:splashText .8s ease .9s both; }
.splash-bar { margin-top:32px; width:120px; height:2px; border-radius:1px; background:rgba(255,255,255,0.06); overflow:hidden; animation:splashText .6s ease 1.1s both; }
.splash-bar-inner { width:100%; height:100%; border-radius:1px; background:linear-gradient(90deg,transparent,rgba(178,34,52,0.6),transparent); background-size:200% 100%; animation:shimmer 1.5s linear infinite; }

/* ═══ AURORA ═══ */
.aurora {
  position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
}
.aurora-grad {
  position: absolute; width: 150%; height: 150%; top: -25%; left: -25%;
  background:
    radial-gradient(ellipse 70% 50% at 25% 25%, rgba(139,0,20,0.06) 0%, transparent 55%),
    radial-gradient(ellipse 55% 70% at 75% 65%, rgba(180,60,40,0.04) 0%, transparent 50%),
    radial-gradient(ellipse 60% 40% at 50% 5%, rgba(200,160,100,0.03) 0%, transparent 45%);
  animation: auroraMove 30s ease-in-out infinite alternate;
}
.aurora-grain {
  position: absolute; inset: 0; opacity: 0.4;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  background-size: 180px;
}
.particle {
  position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
}

/* ═══ MAPLE LEAF SVG ═══ */
.leaf-svg { display: inline-block; }
.leaf-pulse { animation: leafPulse 3s ease-in-out infinite; }

/* ═══ HEADER ═══ */
#header {
  position: relative; z-index: 10; padding: 12px 28px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  background: rgba(10,8,9,0.55); backdrop-filter: blur(40px) saturate(1.4);
  animation: headerDrop .7s cubic-bezier(.16,1,.3,1) .05s both;
}
.header-logo {
  width: 38px; height: 38px; border-radius: 12px;
  background: linear-gradient(135deg, #B22234, #D44840);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 20px rgba(178,34,52,0.4);
  animation: glowBreath 5s ease-in-out infinite;
}
.header-left { display: flex; align-items: center; gap: 14px; }
.header-title { font-family:'Playfair Display',serif; font-size:16px; font-weight:500; color:rgba(255,255,255,0.9); letter-spacing:.5px; }
.header-sub { font-size:10px; color:rgba(255,255,255,0.28); letter-spacing:2px; text-transform:uppercase; margin-top:2px; font-weight:500; }
.header-right { display: flex; align-items: center; gap: 16px; }
.status-dots { display: flex; gap: 8px; align-items: center; }
.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: rgba(255,255,255,0.08);
  transition: all .6s cubic-bezier(.16,1,.3,1);
}
.status-dot.active { animation: statusPulse 2s ease-in-out infinite; }
.status-label { font-size:9px; color:rgba(255,255,255,0.55); font-weight:600; letter-spacing:.3px; margin-left:2px; display:none; }
.status-label.active { display: inline; }
.btn-new {
  padding: 7px 16px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03); font-size: 12px; font-weight: 500;
  cursor: pointer; color: rgba(255,255,255,0.45); transition: all .3s;
  backdrop-filter: blur(10px); font-family: 'Outfit', sans-serif;
}
.btn-new:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.8); border-color: rgba(255,255,255,0.15); }

/* ═══ CHAT AREA ═══ */
#chat-area { flex: 1; overflow-y: auto; position: relative; z-index: 1; padding: 28px 0; }
#chat-inner { max-width: 760px; margin: 0 auto; padding: 0 24px; }

/* ═══ HERO ═══ */
#hero { text-align: center; padding-top: 8vh; animation: heroIn 1s cubic-bezier(.16,1,.3,1) .1s both; }
.hero-orbit { position: relative; width: 110px; height: 110px; margin: 0 auto 36px; }
.orbit-ring { position: absolute; border-radius: 50%; }
.orbit-ring-1 { inset: -16px; border: 1px solid rgba(178,34,52,0.12); animation: orbit 24s linear infinite; }
.orbit-ring-2 { inset: -32px; border: 1px dashed rgba(178,34,52,0.06); animation: orbit 40s linear infinite reverse; }
.orbit-dot { position: absolute; border-radius: 50%; top: -3px; left: 50%; }
.orbit-dot-1 { width:7px; height:7px; background:rgba(220,90,70,0.5); margin-left:-3px; box-shadow:0 0 8px rgba(220,90,70,0.4); }
.orbit-dot-2 { width:4px; height:4px; background:rgba(200,160,100,0.3); margin-left:-2px; top:-2px; }
.hero-logo-main {
  width: 110px; height: 110px; border-radius: 32px;
  background: linear-gradient(135deg, #A01E2E, #C83A40, #E06050);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 100px rgba(178,34,52,0.35), 0 24px 80px rgba(0,0,0,0.5);
}
.hero-h1 { font-family:'Playfair Display',serif; font-size:42px; font-weight:400; color:rgba(255,255,255,0.93); line-height:1.15; margin-bottom:16px; opacity:0; animation:heroIn .9s ease .35s forwards; }
.hero-gradient { background:linear-gradient(90deg,#E8A87C,#D4735E,#C85C4A,#E8A87C); background-size:200% auto; -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-style:italic; animation:shimmer 4s linear infinite; }
.hero-p { color:rgba(255,255,255,0.35); font-size:15px; max-width:460px; margin:0 auto 16px; line-height:1.75; font-weight:300; letter-spacing:.2px; opacity:0; animation:heroIn .9s ease .5s forwards; }
.arch-row { display:flex; justify-content:center; gap:10px; margin:32px auto 44px; flex-wrap:wrap; max-width:520px; opacity:0; animation:heroIn .9s ease .6s forwards; }
.arch-card {
  padding: 12px 16px; border-radius: 14px; min-width: 112px;
  background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.055);
  text-align: center; transition: all .35s cubic-bezier(.16,1,.3,1); cursor: default;
  backdrop-filter: blur(8px);
}
.arch-card:hover { background: rgba(255,255,255,0.06); transform: translateY(-4px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
.arch-icon { font-size: 20px; margin-bottom: 5px; }
.arch-label { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.6); letter-spacing: .3px; }
.arch-sub { font-size: 9px; color: rgba(255,255,255,0.22); margin-top: 3px; letter-spacing: .6px; }
.quick-row { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
.quick-pill {
  padding: 11px 20px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03); color: rgba(255,255,255,0.5);
  font-size: 13px; font-weight: 500; cursor: pointer; backdrop-filter: blur(12px);
  transition: all .35s cubic-bezier(.16,1,.3,1); font-family: 'Outfit', sans-serif;
  opacity: 0;
}
.quick-pill:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.9); transform: translateY(-3px); box-shadow: 0 6px 24px rgba(178,34,52,0.12); }

/* ═══ MESSAGES ═══ */
.msg-row { display: flex; margin-bottom: 22px; }
.msg-row.user { justify-content: flex-end; animation: msgRight .55s cubic-bezier(.16,1,.3,1) forwards; }
.msg-row.assistant { justify-content: flex-start; animation: msgLeft .55s cubic-bezier(.16,1,.3,1) forwards; }
.msg-avatar {
  width: 34px; height: 34px; border-radius: 11px; margin-right: 12px; flex-shrink: 0;
  background: rgba(178,34,52,0.08); border: 1px solid rgba(178,34,52,0.12);
  display: flex; align-items: center; justify-content: center;
}
.msg-body { max-width: 78%; min-width: 60px; }
.route-badge {
  display: inline-flex; align-items: center; gap: 5px; padding: 3px 13px 3px 9px;
  border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: .4px;
  color: #fff; margin-bottom: 8px;
  animation: badgePop .45s cubic-bezier(.34,1.56,.64,1) forwards;
}
.badge-rag { background: linear-gradient(135deg,#1a5c3a,#2d8a5e); box-shadow: 0 3px 14px rgba(45,138,94,0.3); }
.badge-visa { background: linear-gradient(135deg,#6b3a00,#a05500); box-shadow: 0 3px 14px rgba(160,85,0,0.3); }
.badge-appt { background: linear-gradient(135deg,#1a3a6b,#2855a0); box-shadow: 0 3px 14px rgba(40,85,160,0.3); }
.badge-oos { background: linear-gradient(135deg,#5a1a1a,#8a2d2d); box-shadow: 0 3px 14px rgba(138,45,45,0.3); }
.msg-bubble {
  padding: 14px 20px; font-size: 14px; line-height: 1.72; font-weight: 400;
  letter-spacing: .15px; white-space: pre-wrap; word-break: break-word;
}
.msg-bubble.user {
  border-radius: 20px 20px 6px 20px;
  background: linear-gradient(135deg, #B22234, #C44040);
  color: #fff;
  box-shadow: 0 6px 28px rgba(178,34,52,0.35), 0 2px 6px rgba(0,0,0,0.2);
}
.msg-bubble.assistant {
  border-radius: 20px 20px 20px 6px;
  background: rgba(255,255,255,0.05);
  color: rgba(255,255,255,0.85);
  border: 1px solid rgba(255,255,255,0.07);
  box-shadow: 0 3px 16px rgba(0,0,0,0.18);
  backdrop-filter: blur(24px) saturate(1.2);
}

/* ═══ MARKDOWN RENDERING ═══ */
.msg-bubble.assistant h3 {
  font-size: 15px; font-weight: 600; color: rgba(255,255,255,0.95);
  margin: 16px 0 8px; padding-bottom: 6px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  font-family: 'Playfair Display', serif; letter-spacing: 0.3px;
}
.msg-bubble.assistant h3:first-child { margin-top: 0; }
.msg-bubble.assistant strong {
  color: rgba(255,255,255,0.95); font-weight: 600;
}
.msg-bubble.assistant em { color: rgba(255,255,255,0.7); font-style: italic; }
.msg-bubble.assistant ul, .msg-bubble.assistant ol {
  margin: 8px 0; padding-left: 20px;
}
.msg-bubble.assistant li {
  margin: 6px 0; line-height: 1.7; position: relative;
}
.msg-bubble.assistant ul li::marker { color: rgba(178,34,52,0.6); }
.msg-bubble.assistant a {
  color: #E8A87C; text-decoration: none;
  border-bottom: 1px solid rgba(232,168,124,0.3);
  transition: all 0.2s;
}
.msg-bubble.assistant a:hover {
  color: #f0c0a0; border-bottom-color: rgba(232,168,124,0.6);
}
.msg-bubble.assistant code {
  background: rgba(255,255,255,0.08); padding: 2px 6px;
  border-radius: 4px; font-size: 12px;
  font-family: 'SF Mono', 'Fira Code', monospace;
}
.msg-bubble.assistant hr {
  border: none; border-top: 1px solid rgba(255,255,255,0.08);
  margin: 14px 0;
}
.msg-bubble.assistant p { margin: 8px 0; }
.msg-bubble.assistant p:first-child { margin-top: 0; }
.msg-bubble.assistant p:last-child { margin-bottom: 0; }
.msg-bubble.assistant .source-cite {
  display: inline-block; padding: 1px 8px; border-radius: 6px;
  background: rgba(178,34,52,0.12); color: rgba(255,255,255,0.6);
  font-size: 11px; font-weight: 500; letter-spacing: 0.2px;
  border: 1px solid rgba(178,34,52,0.15); margin: 1px 0;
}
.msg-bubble.assistant .sim-box {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px; padding: 14px 18px; margin: 10px 0;
}
.msg-bubble.assistant .sim-box strong { color: #E8A87C; }
.msg-bubble.assistant .disclaimer {
  font-size: 12px; color: rgba(255,255,255,0.4); font-style: italic;
  margin-top: 10px; padding-top: 8px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.msg-time { font-size: 10px; color: rgba(255,255,255,0.18); margin-top: 7px; }
.msg-row.user .msg-time { text-align: right; padding-right: 4px; }
.msg-row.assistant .msg-time { text-align: left; padding-left: 4px; }

/* ═══ THINKING INDICATOR ═══ */
.thinking { display: flex; align-items: center; gap: 7px; }
.thinking-label { font-size: 12px; color: rgba(255,255,255,0.35); font-weight: 500; letter-spacing: .5px; }
.thinking-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.35); }
.thinking-dot:nth-child(2) { animation: dotBounce 1.4s ease-in-out 0s infinite; }
.thinking-dot:nth-child(3) { animation: dotBounce 1.4s ease-in-out .16s infinite; }
.thinking-dot:nth-child(4) { animation: dotBounce 1.4s ease-in-out .32s infinite; }

/* ═══ INPUT BAR ═══ */
#input-bar {
  position: relative; z-index: 10; padding: 16px 24px 28px;
  background: linear-gradient(to top, rgba(6,4,5,0.97) 0%, rgba(6,4,5,0.75) 65%, transparent 100%);
  animation: barRise .8s cubic-bezier(.16,1,.3,1) .25s both;
}
#input-inner { max-width: 760px; margin: 0 auto; }
#input-box {
  display: flex; align-items: flex-end; gap: 10px;
  padding: 5px 5px 5px 20px; border-radius: 22px;
  border: 1px solid rgba(255,255,255,0.06);
  background: rgba(255,255,255,0.025);
  backdrop-filter: blur(40px) saturate(1.3);
  transition: all .5s cubic-bezier(.16,1,.3,1);
  box-shadow: 0 6px 32px rgba(0,0,0,0.25);
}
#input-box.focused {
  border-color: rgba(178,34,52,0.3);
  background: rgba(255,255,255,0.04);
  box-shadow: 0 0 0 4px rgba(178,34,52,0.06), 0 12px 48px rgba(0,0,0,0.35);
}
#msg-input {
  flex: 1; padding: 13px 0; border: none; outline: none;
  font-size: 14px; resize: none; line-height: 1.6;
  background: transparent; color: rgba(255,255,255,0.88);
  font-weight: 400; letter-spacing: .15px;
  font-family: 'Outfit', sans-serif;
}
#msg-input::placeholder { color: rgba(255,255,255,0.25); }
#send-btn {
  width: 44px; height: 44px; border-radius: 15px; border: none; flex-shrink: 0;
  background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.15);
  cursor: default; display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 600; transition: all .35s cubic-bezier(.16,1,.3,1);
}
#send-btn.active {
  background: linear-gradient(135deg, #B22234, #D44840);
  color: #fff; cursor: pointer;
  box-shadow: 0 4px 20px rgba(178,34,52,0.4); transform: scale(1);
}
#send-btn:not(.active) { transform: scale(0.92); }
.footer-text {
  text-align: center; margin-top: 12px; font-size: 10px;
  color: rgba(255,255,255,0.14); letter-spacing: 1.5px; text-transform: uppercase;
}
</style>
</head>
<body>

<!-- ═══ SPLASH SCREEN ═══ -->
<div id="splash">
  <div class="splash-ring splash-ring-1"></div>
  <div class="splash-ring splash-ring-2"></div>
  <div class="splash-logo">
    <div class="splash-logo-inner">
      <svg width="48" height="48" viewBox="0 0 100 100" fill="#fff"><path d="M50 5 L45 25 L25 20 L35 38 L10 45 L30 52 L20 75 L40 60 L50 95 L60 60 L80 75 L70 52 L90 45 L65 38 L75 20 L55 25 Z"/></svg>
    </div>
  </div>
  <div class="splash-title">Canada Travel Advisory</div>
  <div class="splash-sub">Multi-Agent Intelligence System</div>
  <div class="splash-bar"><div class="splash-bar-inner"></div></div>
</div>

<!-- ═══ AURORA BACKGROUND ═══ -->
<div class="aurora"><div class="aurora-grad"></div><div class="aurora-grain"></div></div>

<!-- ═══ PARTICLES ═══ -->
<script>
for(let i=0;i<8;i++){const d=document.createElement('div');d.className='particle';
d.style.cssText=`width:${i%2===0?3:2}px;height:${i%2===0?3:2}px;background:rgba(${180+i*8},${80+i*5},${60+i*4},0.2);left:${10+i*11}%;top:${15+(i%4)*20}%;animation:float ${7+i*1.5}s ease-in-out ${i*1.2}s infinite;`;
document.body.appendChild(d);}
</script>

<!-- ═══ HEADER ═══ -->
<header id="header">
  <div class="header-left">
    <div class="header-logo">
      <svg width="20" height="20" viewBox="0 0 100 100" fill="#fff" class="leaf-pulse"><path d="M50 5 L45 25 L25 20 L35 38 L10 45 L30 52 L20 75 L40 60 L50 95 L60 60 L80 75 L70 52 L90 45 L65 38 L75 20 L55 25 Z"/></svg>
    </div>
    <div>
      <div class="header-title">Canada Travel Advisory</div>
      <div class="header-sub">RAG · LangGraph · Multi-Agent</div>
    </div>
  </div>
  <div class="header-right">
    <div class="status-dots">
      <div class="status-item" data-agent="rag"><span class="status-dot" id="dot-rag"></span><span class="status-label" id="lbl-rag">Travel Advisor</span></div>
      <div class="status-item" data-agent="visa_checker"><span class="status-dot" id="dot-visa"></span><span class="status-label" id="lbl-visa">Visa Checker</span></div>
      <div class="status-item" data-agent="appointment_booker"><span class="status-dot" id="dot-appt"></span><span class="status-label" id="lbl-appt">Appointments</span></div>
    </div>
    <button class="btn-new" onclick="resetChat()">✦ New Chat</button>
  </div>
</header>

<!-- ═══ CHAT AREA ═══ -->
<div id="chat-area">
  <div id="chat-inner">
    <!-- Hero inserted by JS -->
  </div>
</div>

<!-- ═══ INPUT BAR ═══ -->
<div id="input-bar">
  <div id="input-inner">
    <div id="input-box">
      <textarea id="msg-input" rows="1" placeholder="Ask about travel safety, visas, or appointments..."></textarea>
      <button id="send-btn" onclick="sendMessage()">↑</button>
    </div>
    <div class="footer-text">Government of Canada Travel Advisories · RSM8430 Final Project</div>
  </div>
</div>

<script>
const LEAF_SVG_16 = '<svg width="16" height="16" viewBox="0 0 100 100" fill="rgba(200,80,70,0.75)"><path d="M50 5 L45 25 L25 20 L35 38 L10 45 L30 52 L20 75 L40 60 L50 95 L60 60 L80 75 L70 52 L90 45 L65 38 L75 20 L55 25 Z"/></svg>';

const BADGE_MAP = {
  rag: { label:"Travel Advisor", icon:"🌏", cls:"badge-rag" },
  visa_checker: { label:"Visa Checker", icon:"🛂", cls:"badge-visa" },
  appointment_booker: { label:"Appointments", icon:"📅", cls:"badge-appt" },
  out_of_scope: { label:"Out of Scope", icon:"⛔", cls:"badge-oos" },
};

const STATUS_STYLE = {
  rag: "linear-gradient(135deg,#1a5c3a,#2d8a5e)",
  visa_checker: "linear-gradient(135deg,#6b3a00,#a05500)",
  appointment_booker: "linear-gradient(135deg,#1a3a6b,#2855a0)",
};

let messages = [];
let currentIntent = null;
let loading = false;

const chatInner = document.getElementById('chat-inner');
const chatArea = document.getElementById('chat-area');
const msgInput = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const inputBox = document.getElementById('input-box');

// ── Splash ──
setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 2400);

// ── Input focus ──
msgInput.addEventListener('focus', () => inputBox.classList.add('focused'));
msgInput.addEventListener('blur', () => inputBox.classList.remove('focused'));
msgInput.addEventListener('input', updateSendBtn);
msgInput.addEventListener('keydown', e => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); }});

function updateSendBtn() {
  if (msgInput.value.trim() && !loading) sendBtn.classList.add('active');
  else sendBtn.classList.remove('active');
}

function scrollToBottom() {
  chatArea.scrollTop = chatArea.scrollHeight;
}

function timeStr() {
  return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function updateStatusDots(intent) {
  ['rag','visa_checker','appointment_booker'].forEach(k => {
    const dot = document.getElementById('dot-' + (k==='visa_checker'?'visa':k==='appointment_booker'?'appt':k));
    const lbl = document.getElementById('lbl-' + (k==='visa_checker'?'visa':k==='appointment_booker'?'appt':k));
    if (k === intent) {
      dot.style.background = STATUS_STYLE[k] || 'rgba(255,255,255,0.08)';
      dot.style.boxShadow = '0 0 12px rgba(178,34,52,0.3)';
      dot.classList.add('active');
      lbl.classList.add('active');
    } else {
      dot.style.background = 'rgba(255,255,255,0.08)';
      dot.style.boxShadow = 'none';
      dot.classList.remove('active');
      lbl.classList.remove('active');
    }
  });
}

// ── Hero ──
function renderHero() {
  chatInner.innerHTML = `
  <div id="hero">
    <div class="hero-orbit">
      <div class="orbit-ring orbit-ring-1"><div class="orbit-dot orbit-dot-1"></div></div>
      <div class="orbit-ring orbit-ring-2"><div class="orbit-dot orbit-dot-2"></div></div>
      <div class="hero-logo-main">
        <svg width="54" height="54" viewBox="0 0 100 100" fill="#fff" class="leaf-pulse"><path d="M50 5 L45 25 L25 20 L35 38 L10 45 L30 52 L20 75 L40 60 L50 95 L60 60 L80 75 L70 52 L90 45 L65 38 L75 20 L55 25 Z"/></svg>
      </div>
    </div>
    <h1 class="hero-h1">Your Canadian<br><span class="hero-gradient">Travel Intelligence</span></h1>
    <p class="hero-p">Powered by retrieval-augmented generation and a multi-agent<br>architecture built on LangGraph with ChromaDB.</p>
    <div class="arch-row">
      <div class="arch-card"><div class="arch-icon">🧠</div><div class="arch-label">Supervisor</div><div class="arch-sub">Intent Router</div></div>
      <div class="arch-card"><div class="arch-icon">🌍</div><div class="arch-label">Travel Advisor</div><div class="arch-sub">RAG Pipeline</div></div>
      <div class="arch-card"><div class="arch-icon">🛂</div><div class="arch-label">Visa Checker</div><div class="arch-sub">Multi-turn</div></div>
      <div class="arch-card"><div class="arch-icon">📅</div><div class="arch-label">Appointments</div><div class="arch-sub">Slot Collection</div></div>
    </div>
    <div class="quick-row">
      <button class="quick-pill" style="animation:pillUp .65s cubic-bezier(.16,1,.3,1) .75s forwards" onclick="quickSend('Is it safe for a Canadian to travel to Japan right now?')">🇯🇵 Japan safety check</button>
      <button class="quick-pill" style="animation:pillUp .65s cubic-bezier(.16,1,.3,1) .83s forwards" onclick="quickSend('I have a Canadian passport. Do I need a visa for Vietnam for tourism?')">🇻🇳 Vietnam visa info</button>
      <button class="quick-pill" style="animation:pillUp .65s cubic-bezier(.16,1,.3,1) .91s forwards" onclick="quickSend('I am a Canadian travelling to Brazil. Any health or vaccine precautions?')">🇧🇷 Brazil health tips</button>
      <button class="quick-pill" style="animation:pillUp .65s cubic-bezier(.16,1,.3,1) .99s forwards" onclick="quickSend('Please book me a passport renewal appointment in Toronto.')">📅 Book appointment</button>
    </div>
  </div>`;
}

function quickSend(text) { msgInput.value = text; sendMessage(); }

// ── Markdown renderer ──
function renderMarkdown(text) {
  let html = text;

  // Horizontal rules
  html = html.replace(/^---+$/gm, '<hr>');

  // Headers: ### and **Header**\n (standalone bold lines as headers)
  html = html.replace(/^###\s+(.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^##\s+(.+)$/gm, '<h3>$1</h3>');

  // Bold + Italic
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic
  html = html.replace(/(?<!\*)\*([^*\n]+?)\*(?!\*)/g, '<em>$1</em>');

  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Links: [text](url)
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  // Source citations: [Destination - Section]
  html = html.replace(/\[([A-Z][^\]]*?)\s*[-–]\s*([^\]]+)\]/g, '<span class="source-cite">$1 — $2</span>');

  // Unordered lists: lines starting with - or •
  html = html.replace(/^[\s]*[-•]\s+(.+)/gm, '<li>$1</li>');
  html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');

  // Numbered lists
  html = html.replace(/^\d+\.\s+(.+)/gm, '<li>$1</li>');

  // Paragraphs: split by double newlines
  const blocks = html.split(/\n\n+/);
  html = blocks.map(block => {
    block = block.trim();
    if (!block) return '';
    if (block.startsWith('<h3') || block.startsWith('<ul') || block.startsWith('<ol') || block.startsWith('<hr')) return block;
    // Don't wrap already-wrapped blocks
    if (block.startsWith('<')) return block;
    // Replace single newlines with <br> within paragraphs
    block = block.replace(/\n/g, '<br>');
    return `<p>${block}</p>`;
  }).join('\n');

  // Clean up any remaining single newlines between tags
  html = html.replace(/<\/p>\n<p>/g, '</p><p>');

  return html;
}

// ── Render messages ──
function renderMessages() {
  chatInner.innerHTML = '';
  messages.forEach((msg, i) => {
    const isUser = msg.role === 'user';
    const row = document.createElement('div');
    row.className = `msg-row ${msg.role}`;
    row.style.animationDelay = Math.min(i * 0.04, 0.12) + 's';

    let html = '';
    if (!isUser) {
      html += `<div class="msg-avatar">${LEAF_SVG_16}</div>`;
    }
    html += '<div class="msg-body">';
    if (!isUser && msg.intent) {
      const b = BADGE_MAP[msg.intent] || BADGE_MAP.rag;
      html += `<div class="route-badge ${b.cls}"><span style="font-size:13px">${b.icon}</span> ${b.label}</div>`;
    }
    // Escape HTML
    const escaped = msg.content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const rendered = isUser ? escaped : renderMarkdown(escaped);
    html += `<div class="msg-bubble ${msg.role}">${rendered}</div>`;
    html += `<div class="msg-time">${msg.time || ''}</div>`;
    html += '</div>';
    row.innerHTML = html;
    chatInner.appendChild(row);
  });
  scrollToBottom();
}

function showThinking() {
  const row = document.createElement('div');
  row.className = 'msg-row assistant';
  row.id = 'thinking-row';
  row.innerHTML = `
    <div class="msg-avatar">${LEAF_SVG_16}</div>
    <div class="msg-body">
      <div class="msg-bubble assistant">
        <div class="thinking">
          <span class="thinking-label">Thinking</span>
          <div class="thinking-dot"></div><div class="thinking-dot"></div><div class="thinking-dot"></div>
        </div>
      </div>
    </div>`;
  chatInner.appendChild(row);
  scrollToBottom();
}

function hideThinking() {
  const el = document.getElementById('thinking-row');
  if (el) el.remove();
}

// ── Send ──
async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || loading) return;

  // Remove hero if visible
  const hero = document.getElementById('hero');
  if (hero) hero.remove();

  msgInput.value = '';
  updateSendBtn();
  loading = true;

  messages.push({ role: 'user', content: text, time: timeStr() });
  renderMessages();
  showThinking();

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: messages.map(m => ({ role: m.role, content: m.content })),
        current_intent: currentIntent,
      }),
    });
    const data = await resp.json();
    currentIntent = data.intent;
    updateStatusDots(data.intent);

    hideThinking();
    messages.push({ role: 'assistant', content: data.response, intent: data.intent, time: timeStr() });
    renderMessages();
  } catch (e) {
    hideThinking();
    messages.push({ role: 'assistant', content: 'Connection error. Make sure the server is running.', intent: 'out_of_scope', time: timeStr() });
    renderMessages();
  }

  loading = false;
  updateSendBtn();
  msgInput.focus();
}

function resetChat() {
  messages = [];
  currentIntent = null;
  updateStatusDots(null);
  renderHero();
  msgInput.focus();
}

// ── Init ──
renderHero();
</script>
</body>
</html>
